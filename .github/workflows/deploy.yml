name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H 137.184.132.232 >> ~/.ssh/known_hosts

      - name: Copy app files to server
        run: |
          scp -o IdentitiesOnly=yes \
            server.js package.json seed-user.js \
            root@137.184.132.232:/var/www/myapp/

      - name: Install dependencies and restart app
        run: |
          ssh -o IdentitiesOnly=yes root@137.184.132.232 \
            "cd /var/www/myapp && npm install --omit=dev --silent && systemctl restart myapp"

      - name: Verify app responds
        run: |
          sleep 3
          curl -sf http://137.184.132.232 | grep -q "Sign in"
