name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: 137.184.132.232
      DEPLOY_USER: root
      DEPLOY_PATH: /var/www/myapp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Copy app files to server
        run: |
          scp -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            server.js package.json seed-user.js \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Install dependencies and restart app
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $DEPLOY_PATH && npm install --omit=dev --silent && systemctl restart myapp"

      - name: Verify app responds
        run: |
          sleep 3
          curl -sf "http://$DEPLOY_HOST" | head -c 200
